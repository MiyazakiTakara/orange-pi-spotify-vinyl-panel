<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#080a0f">
  <title>Orange Pi Audio</title>
  <link rel="stylesheet" href="/player.css?v=11">
  <script src="/app.js?v=11" defer></script>
</head>
<body>
  <main class="player">
    <section class="turntable" aria-label="Odtwarzany utwór">
      <div class="plinth">
        <div class="platter-stage">
          <div class="platter" aria-hidden="true"></div>

          <div class="record" aria-hidden="true">
            <div class="record-rotor" id="recordRotor">
              <div class="label-cover" id="coverHolder">
                <div class="cover-placeholder">♪</div>
              </div>
            </div>
          </div>

          <svg class="tonearm-svg" viewBox="0 0 320 320" aria-hidden="true">
            <defs>
              <radialGradient id="pivotMetal" cx="35%" cy="28%" r="72%">
                <stop offset="0" stop-color="#f0f2f6" />
                <stop offset="0.45" stop-color="#9da6b3" />
                <stop offset="1" stop-color="#535b68" />
              </radialGradient>
            </defs>

            <g class="tonearm-moving" id="tonearm" transform="rotate(16 278 42)">
              <rect class="tonearm-counterweight" x="265" y="4" width="26" height="27" rx="10" />
              <path class="tonearm-tube-shadow" d="M278 24 L278 258 Q278 292 255 311" />
              <path class="tonearm-tube" d="M278 24 L278 258 Q278 292 255 311" />
              <path class="tonearm-tube-highlight" d="M275.5 27 L275.5 257 Q275.5 288 252 307" />
              <path class="tonearm-headshell" d="M244 302 L266 310 L264 335 Q263 341 256 340 L237 333 Q231 331 234 324 Z" />
              <rect class="tonearm-cartridge" x="239" y="328" width="17" height="10" rx="2" transform="rotate(18 247.5 333)" />
              <line class="tonearm-stylus" x1="244" y1="336" x2="238" y2="351" />
            </g>

            <circle class="tonearm-pivot-shadow" cx="278" cy="42" r="25" />
            <circle class="tonearm-pivot-ring" cx="278" cy="42" r="22" />
            <circle class="tonearm-pivot-core" cx="278" cy="42" r="10" />
          </svg>
        </div>
      </div>

      <div class="track-info" id="trackInfo" aria-live="polite">
        <h1 class="track-title" id="trackTitle">Czekam na utwór...</h1>
        <time class="playtime" id="playtime">00:00 / 00:00</time>
      </div>
    </section>
  </main>
</body>
</html>
