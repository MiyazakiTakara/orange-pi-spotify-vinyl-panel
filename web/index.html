<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Orange Pi Audio</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/vinyl-performance.css">
</head>
<body>
  <main class="page minimal-player">
    <section class="app-shell">
      <section class="turntable-panel">
        <div class="turntable-box">
          <div class="deck">
            <div class="platter-area">
              <div class="vinyl-stage waiting" id="vinylStage">
                <div class="platter"></div>
                <div class="record" id="record">
                  <div class="record-rotor spin">
                    <div class="label-cover" id="coverHolder"><div class="no-cover">♪</div></div>
                  </div>
                </div>
                <div class="tonearm-area">
                  <div class="arm-base"></div>
                  <div class="arm" id="tonearm"><div class="stylus"></div></div>
                </div>
              </div>
            </div>

            <div class="now-playing-strip minimal-meta">
              <div class="strip-text">
                <strong id="progressTitle">Czekam na utwór...</strong>
              </div>
              <div class="strip-time" id="progressTime">00:00 / 00:00</div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div class="visually-hidden" aria-hidden="true">
    <h1 id="title"></h1>
    <div id="artist"></div>
    <div id="progressArtist"></div>
    <div id="trackIdBox"></div>
    <a id="spotifyBtn" href="#"></a>
    <div id="updatedAt"></div>
    <div id="miniStatus"></div>
    <div id="clientValue"></div>
    <div id="shuffleValue"></div>
    <div id="repeatValue"></div>
    <div id="statusBadge"></div>
    <div id="connectionBadge"></div>
    <div id="errorBox"></div>
    <div id="timeBadge"></div>
    <div id="progressGlow"></div>
    <div id="progressFill"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
